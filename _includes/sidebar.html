<aside class="sidebar" data-page="{{ page.url | split: '/' | slice: 1 | first | default: 'home' }}">
  <!-- Dark overlay for readability -->
  <div class="sidebar-overlay"></div>
  
  <div class="sidebar-content">
    <!-- Navigation at top (minimalist - no icons) -->
    <nav class="sidebar-nav">
      <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">
        Home
      </a>
      <a href="{{ '/about/' | relative_url }}" class="nav-link {% if page.url == '/about/' %}active{% endif %}">
        About
      </a>

      <br>

<p>Semester 3</p>
      <a href="{{ '/bcm302/' | relative_url }}" class="nav-link {% if page.url contains 'bcm302' %}active{% endif %}">
        BCM 302
      </a>

    </nav>
    
    <!-- Spacer pushes content to bottom -->
    <div class="sidebar-spacer"></div>
    
    <!-- Site title at bottom (FIXED LAYOUT) -->
    <div class="sidebar-header">
      <h1 class="site-title">
        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
      </h1>
      <p class="site-description">{{ site.description }}</p>
    </div>
    
    <!-- Social icons at very bottom -->
    <div class="sidebar-footer">
      {% if site.email %}
      <a href="mailto:{{ site.email }}" aria-label="Email" class="social-link">
        <svg class="social-icon" viewBox="0 0 16 16">
          <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2zm13 2.383-4.708 2.825L15 11.105V5.383zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741zM1 11.105l4.708-2.897L1 5.383v5.722z"/>
        </svg>
      </a>
      {% endif %}
    </div>
  </div>
</aside>
